# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  id: d58eaa1c-67af-451e-b63f-5caaa2041a78
  title: myst-baker
  description: Precomputed interactive docs via a MyST executable plugin
  authors:
    - name: Ian Mullens
  github: https://github.com/IansGithubAcc/myst-baker
  toc:
    - file: docs/index.md
    - file: docs/installation.md
    - title: Guide
      children:
        - file: docs/guide/inputs.md
        - file: docs/guide/calculations.md
        - file: docs/guide/outputs.md
    - title: Examples
      children:
        - file: docs/examples/damped-oscillator.md
        - file: docs/examples/projectile-trajectory.md
        - file: docs/examples/revenue-vs-expenses.md
        - file: docs/examples/potential-field-contour.md
    - file: docs/changelog.md
    - file: docs/authors.md
  plugins:
    - type: executable
      # Generated directly by `uv sync` (see docs/installation.md). MyST resolves this as a
      # literal path, not a PATH search, so it must match where uv puts the launcher.
      path: .venv/bin/myst-baker-plugin # Linux/macOS
      # path: .venv/Scripts/myst-baker-plugin.exe # Windows
site:
  template: book-theme
  options:
    favicon: favicon.ico
    style: src/myst_baker/static/plot-embed.css
    logo: docs/site_logo.png
